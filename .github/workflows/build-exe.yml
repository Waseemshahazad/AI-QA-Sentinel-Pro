name: Build AI-QA Sentinel Pro EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Purge Legacy Packages and Install Fresh Dependencies
      run: |
        python -m pip install --upgrade pip
        pip uninstall google google-generativeai -y
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile Standalone Executable with Asset Binding
      run: |
        if (Test-Path "app_icon.ico") {
          pyinstaller --noconfirm --onefile --windowed --icon="app_icon.ico" --add-data "adb_bin;adb_bin" main.py
        } else {
          pyinstaller --noconfirm --onefile --windowed --add-data "adb_bin;adb_bin" main.py
        }

    - name: Upload Production Artifact to GitHub Workspace
      uses: actions/upload-artifact@v4
      with:
        name: AI-QA-Sentinel-Pro-v1.0
        path: dist/main.exe